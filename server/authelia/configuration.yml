# Authelia 主配置 —— 单用户 + TOTP 两步验证，保护整个子域 fleet.example.com。
# 占位 {{FLEET_HOST}} 部署时由 scripts/setup-server.sh 用 .env 的 FLEET_HOST 替换。
# 敏感密钥(jwt/session/storage_encryption)从环境变量 *_FILE 注入（见 systemd/authelia.service），不写死。
#
# 部署位置：/etc/authelia/configuration.yml ；数据：/var/lib/authelia ；门户路径：/auth

theme: dark

server:
  # Authelia 只接受「单段」子路径。门户挂在单段 /auth；子域下其余路径由 nginx auth_request 保护。
  address: 'tcp://127.0.0.1:9091/auth'

log:
  level: info

# 访问控制：默认拒；子域 fleet.example.com 下所有路径要求 2FA。
# （/auth 门户与 /enroll 自助入网在 nginx 层不过 auth_request，故不受此规则影响。）
access_control:
  default_policy: deny
  rules:
    - domain: '{{FLEET_HOST}}'
      policy: two_factor

session:
  name: authelia_session
  cookies:
    - domain: '{{FLEET_HOST}}'
      authelia_url: 'https://{{FLEET_HOST}}:20443/auth'
      default_redirection_url: 'https://{{FLEET_HOST}}:20443/'
      # F3：登录有效期 ~30 天。expiration=会话绝对寿命，inactivity=空闲超时。
      # 二者都设 30d 才能「30 天内（含长时间不操作）无需重新认证」——这是用户明确
      # 接受的便利/安全权衡（单用户 + 已有 TOTP + 登录失败锁定 regulation 兜底）。
      expiration: 30d
      inactivity: 30d

# 登录失败锁定（防爆破）
regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 15m

authentication_backend:
  file:
    path: /etc/authelia/users_database.yml

# TOTP 两步验证（任意 Authenticator app 扫码即用）
totp:
  issuer: 'mac-fleet-hub'

storage:
  local:
    path: /var/lib/authelia/db.sqlite3

# 开发期用文件通知收 TOTP 注册链接；生产可改 SMTP。
notifier:
  filesystem:
    filename: /var/lib/authelia/notification.txt
