# Authelia 主配置 —— 单用户 + TOTP 两步验证，路径模式（挂在 example.com/fleet 下）
# 占位 {{DOMAIN}} 部署时由 scripts/setup-server.sh 用 .env 的 DOMAIN 替换。
# 敏感密钥(jwt/session/storage_encryption)从环境变量 *_FILE 注入（见 systemd/authelia.service），不写死。
#
# 部署位置：/etc/authelia/configuration.yml ；数据：/var/lib/authelia ；门户路径：/fleet/auth

theme: dark

server:
  # Authelia 只接受「单段」子路径（不能用 /fleet/auth）。故门户挂在单段 /auth；
  # 受保护资源仍在 /fleet（见 access_control）。
  address: 'tcp://127.0.0.1:9091/auth'

log:
  level: info

# 访问控制：默认拒；example.com 下 /fleet 路径要求 2FA。
access_control:
  default_policy: deny
  rules:
    - domain: '{{DOMAIN}}'
      resources:
        - '^/fleet($|/.*)'
      policy: two_factor

session:
  name: authelia_session
  cookies:
    - domain: '{{DOMAIN}}'
      authelia_url: 'https://{{DOMAIN}}:20443/auth'
      default_redirection_url: 'https://{{DOMAIN}}:20443/fleet/'
      expiration: 12h
      inactivity: 1h

# 登录失败锁定（防爆破）
regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 15m

authentication_backend:
  file:
    path: /etc/authelia/users_database.yml

# TOTP 两步验证（任意 Authenticator app 扫码即用）
totp:
  issuer: 'mac-fleet-hub'

storage:
  local:
    path: /var/lib/authelia/db.sqlite3

# 开发期用文件通知收 TOTP 注册链接；生产可改 SMTP。
notifier:
  filesystem:
    filename: /var/lib/authelia/notification.txt
