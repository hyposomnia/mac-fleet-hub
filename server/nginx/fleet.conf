# fleet.conf —— 挂进现有 example.com 的 443 server 块（include 进去，不动现有 / 与 /admin rtm 应用）
#
# 占位符由 scripts/setup-server.sh 用 server/.env 渲染后写到 /etc/nginx/snippets/fleet.conf：
#   __MAC1_IP__ __MAC2_IP__ __MAC3_IP__  各 Mac 的 Headscale mesh IP(100.x)
#   __TTYD_PORT__(7681) __FB_PORT__(8080) __AGENT_PORT__(7682)
#
# 鉴权：所有 /fleet 子路径先过 Authelia(auth_request)；/fleet/auth 是登录门户本身，不加 auth_request。
# WebSocket：ttyd / filebrowser / fleet-agent 的 ws 都靠下面的 Upgrade 透传。

# --- WebSocket 升级映射（放 http 块更佳；这里用 map 需在 http 作用域，setup 脚本会确保只定义一次）---
# map $http_upgrade $fleet_conn_upgrade { default upgrade; '' close; }   # 见 setup-server.sh：写入 conf.d/fleet-map.conf

# ============ Authelia 门户与鉴权端点 ============
location ^~ /fleet/auth {
    proxy_pass http://127.0.0.1:9091;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Uri $request_uri;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# 内部 auth_request 目标（不对外）
location = /fleet/authz {
    internal;
    proxy_pass http://127.0.0.1:9091/api/authz/auth-request;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
    proxy_set_header X-Original-Method $request_method;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# 未登录时把请求重定向到门户
error_page 401 =302 https://$http_host/fleet/auth/?rd=https://$http_host$request_uri;

# ============ 静态控制台壳（PWA） ============
location ^~ /fleet/ {
    auth_request /fleet/authz;
    root /var/www;                      # 实际文件在 /var/www/fleet/
    index index.html;
    try_files $uri $uri/ /fleet/index.html;
}
location = /fleet { return 302 /fleet/; }

# 节点在线状态（由 fleet-nodes.timer 定时写出的静态 JSON）
location = /fleet/api/nodes.json {
    auth_request /fleet/authz;
    root /var/www;
    default_type application/json;
}

# ============ 每台 Mac：终端 / 文件 / 会话 API（经 mesh 反代） ============
# ---- Mac1 ----
location ^~ /fleet/m1/term/ {
    auth_request /fleet/authz;
    proxy_pass http://__MAC1_IP__:__TTYD_PORT__/fleet/m1/term/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $fleet_conn_upgrade;
    proxy_set_header Host $host;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
location ^~ /fleet/m1/files/ {
    auth_request /fleet/authz;
    proxy_pass http://__MAC1_IP__:__FB_PORT__/fleet/m1/files/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
