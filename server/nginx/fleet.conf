# fleet.conf —— mac-fleet-hub 的独立 nginx 站点（子域 mfh.example.com，自带 443 server 块）。
# 与现有 example.com 的 rtm 应用互不影响：靠 SNI(server_name) 区分，同一对通配符证书。
#
# 占位符由 scripts/setup-server.sh 用 server/.env 渲染后写到 NGINX_SITE（默认
#   /etc/nginx/sites-enabled/mac-fleet-hub.conf）：
#   __FLEET_HOST__  服务子域（mfh.example.com）
#   __SSL_CERT__ __SSL_KEY__  通配符证书 *.example.com（与 rtm/headscale 同一张）
#   __MAC1_IP__ __MAC2_IP__ __MAC3_IP__  各 Mac 的 Headscale mesh IP(100.x)
#   __TTYD_PORT__(7681) __FB_PORT__(8080) __AGENT_PORT__(7682)
#
# 鉴权：除 /auth(登录门户) 与 /enroll(自助入网) 外的所有路径先过 Authelia(auth_request)。
# WebSocket：ttyd / filebrowser / fleet-agent 的 ws 都靠下面的 Upgrade 透传。
#
# 注：$fleet_conn_upgrade（map）与 limit_req_zone=fleet_enroll 定义于 http 作用域，
#     由 setup-server.sh 写入 /etc/nginx/conf.d/fleet-map.conf（每实例只定义一次）。

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __FLEET_HOST__;

    ssl_certificate     __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;

    # ============ Authelia 门户与鉴权端点 ============
    # 门户挂在单段路径 /auth（Authelia 不支持多段子路径）。
    location ^~ /auth {
        proxy_pass http://127.0.0.1:9091;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Uri $request_uri;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # 内部 auth_request 目标（不对外）
    location = /authz {
        internal;
        proxy_pass http://127.0.0.1:9091/api/authz/auth-request;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # 未登录时把请求重定向到门户
    error_page 401 =302 https://$http_host/auth/?rd=https://$http_host$request_uri;

    # ============ 自助入网（公开，不过 Authelia；安全靠 TOTP + 限速） ============
    # ^~ 最长前缀优先：/enroll/ 与 = /enroll/join 都比 / 更具体，故先匹配。
    location = /enroll/join {
        limit_req zone=fleet_enroll burst=3 nodelay;
        proxy_pass http://127.0.0.1:7090/join;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
    location ^~ /enroll/ {
        limit_req zone=fleet_enroll burst=10 nodelay;
        alias /var/www/fleet-enroll/;
        autoindex off;
        default_type text/plain;     # bootstrap.sh/uninstall.sh 以纯文本返回；curl|bash 不在意类型
        types {
            application/gzip tar.gz;
            text/plain      sh;
        }
    }

    # ============ 静态控制台壳（PWA） ============
    location / {
        auth_request /authz;
        root /var/www/fleet;                # 物理目录沿用 /var/www/fleet/（URL 已挂子域根）
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    location = /api/nodes.json {            # 节点在线状态（fleet-nodes.timer 定时写出的静态 JSON）
        auth_request /authz;
        root /var/www/fleet;
        default_type application/json;
    }

    # ============ 每台 Mac：终端 / 文件 / 会话 API（经 mesh 反代） ============
    # ---- Mac1 ----
    location ^~ /m1/term/ {
        auth_request /authz;
        proxy_pass http://__MAC1_IP__:__TTYD_PORT__/m1/term/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fleet_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location ^~ /m1/files/ {
        auth_request /authz;
        proxy_pass http://__MAC1_IP__:__FB_PORT__/m1/files/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fleet_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location ^~ /m1/api/ {
        auth_request /authz;
        proxy_pass http://__MAC1_IP__:__AGENT_PORT__/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---- Mac2 ----
    location ^~ /m2/term/ {
        auth_request /authz;
        proxy_pass http://__MAC2_IP__:__TTYD_PORT__/m2/term/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fleet_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location ^~ /m2/files/ {
        auth_request /authz;
        proxy_pass http://__MAC2_IP__:__FB_PORT__/m2/files/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fleet_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location ^~ /m2/api/ {
        auth_request /authz;
        proxy_pass http://__MAC2_IP__:__AGENT_PORT__/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---- Mac3 ----
    location ^~ /m3/term/ {
        auth_request /authz;
        proxy_pass http://__MAC3_IP__:__TTYD_PORT__/m3/term/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fleet_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location ^~ /m3/files/ {
        auth_request /authz;
        proxy_pass http://__MAC3_IP__:__FB_PORT__/m3/files/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fleet_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location ^~ /m3/api/ {
        auth_request /authz;
        proxy_pass http://__MAC3_IP__:__AGENT_PORT__/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
