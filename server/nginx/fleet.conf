    proxy_set_header Host $host;
    proxy_read_timeout 86400s;
}
location ^~ /fleet/m1/api/ {
    auth_request /fleet/authz;
    proxy_pass http://__MAC1_IP__:__AGENT_PORT__/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

