    # ---- Mac__N__ ----
    location ^~ /m__N__/term/ {
        auth_request /authz;
        proxy_pass http://__MAC_IP__:__TTYD_PORT__/m__N__/term/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fleet_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location ^~ /m__N__/files/ {
        auth_request /authz;
        proxy_pass http://__MAC_IP__:__FB_PORT__/m__N__/files/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fleet_conn_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
    location ^~ /m__N__/api/ {
        auth_request /authz;
        proxy_pass http://__MAC_IP__:__AGENT_PORT__/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
