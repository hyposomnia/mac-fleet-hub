# 公网服务器编排：Caddy(网关/TLS) + Authelia(2FA) + Filebrowser(共享目录)
#
# 前置：服务器已加入 Tailscale，且能 ping 通各 Mac 的 100.x 内网 IP。
# Caddy 镜像需带 DNS 插件以做通配证书。两种方式：
#   1) 用社区镜像 ghcr.io/caddybuilds/caddy-cloudflare（已含 cloudflare 插件）
#   2) 自行 xcaddy build 带对应 caddy-dns 插件
# 下面默认走 cloudflare，请按你的 DNS 商替换镜像与 Caddyfile 中的 dns 块。

services:
  caddy:
    image: ghcr.io/caddybuilds/caddy-cloudflare:latest
    restart: unless-stopped
    network_mode: host          # 走 host 网络，便于经 Tailscale 直连各 Mac 内网 IP
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config

  authelia:
    image: authelia/authelia:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./authelia:/config
    ports:
      - "127.0.0.1:9091:9091"   # 仅本机；由 host 网络的 Caddy 反代
    # 首次启动前请生成 secrets，见 scripts/setup-server.sh

  filebrowser:
    image: filebrowser/filebrowser:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${SHARED_DIR}:/srv      # 由 Syncthing 同步的共享目录
      - ./filebrowser/filebrowser.db:/database/filebrowser.db
      - ./filebrowser/settings.json:/config/settings.json:ro
    ports:
      - "127.0.0.1:8088:80"     # 仅本机；Caddyfile 中 reverse_proxy filebrowser:80
    # 注：host 网络下 Caddy 访问它用 127.0.0.1:8088，需把 Caddyfile @shared 改为该地址。
    #     若想用服务名 filebrowser:80，则三者放同一 bridge 网络、Caddy 不用 host 网络
    #     （但那样 Caddy 直连 Tailscale 内网 IP 会更麻烦）。部署时二选一，见 plan。
